name: Pro GitHub Streak Keeper

permissions:
  contents: write

on:
  schedule:
    - cron: '0 10 * * *'  # Runs daily at 10:00 PM Melbourne time
  workflow_dispatch:

jobs:
  check-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Check GitHub contributions via API
        id: activity
        run: |
          USERNAME=${{ github.actor }}
          TODAY=$(date -u +"%Y-%m-%d")

          echo "Checking activity for $USERNAME on $TODAY"

          RESPONSE=$(curl -s https://api.github.com/users/$USERNAME/events)

          COUNT=$(echo "$RESPONSE" | jq "[.[] | select(.created_at | startswith(\"$TODAY\"))] | length")

          echo "Activity count: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "has_activity=true" >> $GITHUB_OUTPUT
          else
            echo "has_activity=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repo
        if: always()
        uses: actions/checkout@v3
      - name: Send Telegram alert
        if: always()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="⚠️ No GitHub activity today! Your streak is at risk!"

      - name: Commit if no activity
        if: always()
        run: |
          echo "No activity detected. Saving streak..."
          date >> streak.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add streak.txt
          git commit -m "Auto streak save" || echo "No changes"
          git push

      - name: Skip commit
        if: steps.activity.outputs.has_activity == 'true'
        run: echo "You already contributed today 🎉"
